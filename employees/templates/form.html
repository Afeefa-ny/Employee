{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="card shadow p-4 col-md-6 mx-auto">
        
        <h3 class="text-center mb-4">
            {% if form.instance.pk %}
                Update Employee
            {% else %}
                Add Employee
            {% endif %}
        </h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Name</label>
                {{ form.name }}
            </div>

            <div class="mb-3">
                <label class="form-label">Role</label>
                {{ form.role }}
            </div>

            <div class="mb-3">
                <label class="form-label">Department</label>
                {{ form.department }}
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                {{ form.email }}
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-dark">
                    Save
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
